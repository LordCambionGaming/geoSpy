name: Deploy GeoSpy su GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Mapillary Token
        run: |
          node -e "
          const fs = require('fs');
          const filePath = 'index.html';
          let content = fs.readFileSync(filePath, 'utf8');
          const token = process.env.MAPILLARY_TOKEN;
          if (!token) {
            console.error('ERRORE: Segreto MAPILLARY_TOKEN non trovato!');
            process.exit(1);
          }
          content = content.replace('REPLACE_ME_WITH_TOKEN', token);
          fs.writeFileSync(filePath, content);
          "
        env:
          MAPILLARY_TOKEN: ${{ secrets.MAPILLARY_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
